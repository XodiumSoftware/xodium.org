<!DOCTYPE html>
<html data-theme="halloween" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>404 - Page Not Found | Xodium</title>
    <link data-trunk href="style.css" rel="tailwind-css"/>
    <link href="icons/favicon.svg" rel="icon"/>
</head>
<body class="bg-base-100 font-mono min-h-screen flex items-center justify-center p-4">
<div class="text-center max-w-lg">
    <!-- 404 with glitch effect -->
    <h1 class="text-8xl font-bold text-primary mb-4">404</h1>

    <!-- Message -->
    <p class="text-2xl text-base-content mb-2">Page not found</p>
    <p class="text-base-content/70 mb-8">The page you're looking for doesn't exist or has been moved.</p>

    <!-- Back to home button -->
    <a class="btn btn-primary btn-lg" href="/">
        <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
        </svg>
        Go Home
    </a>
</div>
</body>
</html>
