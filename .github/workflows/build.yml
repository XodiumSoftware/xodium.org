name: Xodium CI/CD - Build

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: setup-rust
        name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - id: cache-rust
        name: Cache Rust
        uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01

      - id: setup-trunk
        name: Setup Trunk
        uses: jetli/trunk-action@1346cc09eace4beb84e403e199a471346d4684c9
        with:
          version: latest

      - id: build-app
        name: Build App
        run: trunk build --release

      - id: deploy
        name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@707f63750981584eb6abc365a50d441516fb04b8
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=xodiumorg --branch=${{ github.ref_name }} --commit-dirty=true
