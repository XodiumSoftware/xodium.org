<!DOCTYPE html>
<html data-theme="halloween" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta content="Xodium Software - Open source CAD software organization. Building innovative tools for the engineering community." name="description"/>
    <meta content="Xodium, CAD, open source, software, engineering" name="keywords"/>
    <meta content="Xodium Software" name="author"/>

    <!-- Content Security Policy -->
    <meta content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.github.com; img-src 'self' https: data:; font-src 'self';" http-equiv="Content-Security-Policy"/>

    <!-- DNS Prefetch and Preconnect for GitHub API -->
    <link href="https://api.github.com" rel="dns-prefetch"/>
    <link crossorigin="" href="https://api.github.com" rel="preconnect"/>
    <link href="https://avatars.githubusercontent.com" rel="dns-prefetch"/>
    <link crossorigin="" href="https://avatars.githubusercontent.com" rel="preconnect"/>

    <!-- Open Graph / Social Media -->
    <meta content="Xodium Software" property="og:title"/>
    <meta content="Open source CAD software organization. Building innovative tools for the engineering community." property="og:description"/>
    <meta content="https://xodium.org" property="og:url"/>
    <meta content="website" property="og:type"/>
    <meta content="https://xodium.org/icons/favicon-512x512.png" property="og:image"/>

    <!-- Twitter Card -->
    <meta content="summary_large_image" name="twitter:card"/>
    <meta content="Xodium Software" name="twitter:title"/>
    <meta content="Open source CAD software organization. Building innovative tools for the engineering community." name="twitter:description"/>
    <meta content="https://xodium.org/icons/favicon-512x512.png" name="twitter:image"/>

    <!-- PWA -->
    <meta content="#f97316" name="theme-color"/>
    <link href="manifest.json" rel="manifest"/>

    <link data-trunk href="public/favicon.ico" rel="icon"/>
    <link data-trunk href="public/style.css" rel="tailwind-css"/>
    <link data-trunk href="public/icons" rel="copy-dir"/>
    <title>Xodium</title>
</head>
<body class="bg-base-100 font-mono"></body>
</html>
